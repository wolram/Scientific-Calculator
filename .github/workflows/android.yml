name: Android CI

on:
  push:
    branches: ["main"]
    paths:
      - "apps/android-compose/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/android-compose/**"
      - ".github/workflows/android.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android-compose

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        run: gradle test
